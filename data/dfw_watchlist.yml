# =============================================================================
# DFW employer watchlist  —  direct ATS polling   (50+ companies)
# =============================================================================
# Optional precision layer for the job-discovery system. Breadth still comes
# from JobSpy (Indeed + Google Jobs) + hiring.cafe; this file is the
# "catch it the instant it posts" layer for employers you care about.
#
# Verified live: June 2026. `verified: true` = endpoint confirmed against the
# live board. Re-check periodically — companies migrate ATS.
#
# -----------------------------------------------------------------------------
# Endpoint patterns:
#   greenhouse : https://boards-api.greenhouse.io/v1/boards/{token}/jobs?content=true        (GET)
#   lever      : https://api.lever.co/v0/postings/{token}?mode=json                          (GET)
#   ashby      : https://api.ashbyhq.com/posting-api/job-board/{token}                       (GET)
#   workday    : https://{host}/wday/cxs/{tenant}/{site}/jobs                                 (POST)
#                body: {"appliedFacets":{},"limit":20,"offset":0,"searchText":"designer"}
#   proprietary/taleo/icims/phenom : no clean public JSON -> cover via hiring.cafe, NOT here.
# -----------------------------------------------------------------------------


